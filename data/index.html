<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rugby Display</title>
<style>
body{font-family:sans-serif;background:#111;color:#eee;max-width:400px;margin:40px auto;padding:16px}
h1{color:#4af}
button,input[type=range]{margin:8px 0;padding:8px 16px;border-radius:4px;border:none;cursor:pointer}
button{background:#4af;color:#000;width:100%}
.danger{background:#f44}
label{display:block;margin:8px 0}
#status{background:#222;padding:12px;border-radius:4px;font-size:12px;white-space:pre}
</style>
</head>
<body>
<h1>Rugby Display</h1>
<div id="status">Chargement...</div>

<h2>Luminosite</h2>
<input type="range" id="bright" min="10" max="255" value="80"
       oninput="setBrightness(this.value)">
<span id="brightVal">80</span>

<h2>Controles</h2>
<button onclick="nextScene()">Scene suivante</button>
<button class="danger" onclick="restart()">Redemarrer</button>

<script>
async function load() {
  try {
    const r = await fetch('/status');
    const d = await r.json();
    document.getElementById('status').textContent = JSON.stringify(d, null, 2);
  } catch(e) {
    document.getElementById('status').textContent = 'Erreur: ' + e;
  }
}
async function setBrightness(v) {
  document.getElementById('brightVal').textContent = v;
  await fetch('/config', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({brightness: parseInt(v)})
  });
}
async function nextScene() {
  await fetch('/next-scene');
}
async function restart() {
  if (confirm('Redemarrer le display?'))
    await fetch('/restart', {method: 'POST'});
}
load();
setInterval(load, 10000);
</script>
</body>
</html>
