[env:matrixportal_s3]
platform = espressif32
board = adafruit_matrixportal_esp32s3
framework = arduino
board_upload.flash_size = 8MB
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
board_build.arduino.memory_type = qio_qspi
build_type = debug
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
; lib_ignore = WebServer  // migration to synchronous WebServer complete
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DBOARD_HAS_PSRAM
  -DMBEDTLS_SSL_MAX_CONTENT_LEN=8192  ; reduces TLS input/output buffers from 32KB to 16KB total — essential for SRAM-constrained fetches
  -I src
  -I src/data
  -I src/display
  -I src/web

extra_scripts = tools/patch_mbedtls.py

lib_deps =
  mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.0
  adafruit/Adafruit GFX Library@^1.11.0
  adafruit/Adafruit BusIO@^1.14.0
  adafruit/Adafruit NeoPixel@^1.12.0
  bblanchon/ArduinoJson@^7.0.0
  mathieucarbou/ESP Async WebServer@^3.0.0
  mathieucarbou/AsyncTCP@^3.0.0
  paulstoffregen/Time@^1.6.1

[env:wokwi]
platform = espressif32
board = adafruit_matrixportal_esp32s3
framework = arduino
board_upload.flash_size = 8MB
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
monitor_speed = 115200
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DBOARD_HAS_PSRAM
  -I src
  -I src/data
  -I src/display
  -I src/web
